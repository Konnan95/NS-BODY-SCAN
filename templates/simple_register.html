<!DOCTYPE html>
<html>
<head>
    <title>Регистрация - NS Body Scan</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 10px; width: 400px; }
        h1 { color: #ff66b5; text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #ff66b5; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        a { color: #ff66b5; text-decoration: none; display: block; text-align: center; margin-top: 15px; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center; }
        .danger { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NS Body Scan</h1>
        <h2 style="text-align:center">Регистрация</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="post">
            <input type="text" name="username" placeholder="Логин (латиница)" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <input type="text" name="name" placeholder="Ваше имя">
            <input type="number" name="age" placeholder="Возраст">
            <input type="number" step="0.1" name="height" placeholder="Рост (см)">
            <input type="number" step="0.1" name="weight" placeholder="Вес (кг)">
            <select name="goal">
                <option value="tone">Подтянутое тело</option>
                <option value="lose">Похудение</option>
                <option value="gain">Набор массы</option>
                <option value="posture">Коррекция осанки</option>
            </select>
            <select name="activity">
                <option value="1.2">Сидячий образ жизни</option>
                <option value="1.375">Легкая активность (1-3 дня/нед)</option>
                <option value="1.55">Средняя активность (3-5 дней/нед)</option>
                <option value="1.725">Высокая активность (6-7 дней/нед)</option>
                <option value="1.9">Экстремальная активность</option>
            </select>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <a href="/login">Уже есть аккаунт? Войти</a>
    </div>
</body>
</html>
