<!DOCTYPE html>
<html>
<head>
    <title>Страница не найдена - NS Body Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/modern.css">
    <style>
        .error-container {
            text-align: center;
            padding: 60px 20px;
        }
        .error-code {
            font-size: 120px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff66b5 0%, #667eea 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 24px;
            margin-bottom: 15px;
        }
        .error-message {
            color: #718096;
            margin-bottom: 30px;
        }
        .home-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #ff66b5 0%, #ff3388 100%);
            color: white;
            text-decoration: none;
            border-radius: 40px;
            transition: 0.3s;
        }
        .home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🧠 NS Body Scan</h1>
            </div>
            <div class="menu">
                <a href="/dashboard">🏠 Главная</a>
                <a href="/profile">👤 Профиль</a>
                <a href="/analyze">🔍 Анализ</a>
                <a href="/logout">🚪 Выйти</a>
            </div>
        </div>

        <div class="error-container">
            <div class="error-code">404</div>
            <div class="error-title">Страница не найдена</div>
            <div class="error-message">
                Извините, запрашиваемая страница не существует или была перемещена.
            </div>
            <a href="/dashboard" class="home-btn">🏠 Вернуться на главную</a>
        </div>
    </div>
</body>
</html>
