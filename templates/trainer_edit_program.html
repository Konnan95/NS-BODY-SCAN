<!DOCTYPE html>
<html>
<head>
    <title>Редактирование программы - NS Body Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/modern.css">
    <style>
        .editor-container {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .editor-area {
            flex: 2;
        }
        .preview-area {
            flex: 1;
            background: #f8f9fa;
            border-radius: 16px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
        }
        textarea {
            width: 100%;
            padding: 15px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.5;
            min-height: 500px;
            resize: vertical;
        }
        .preview-area pre {
            white-space: pre-wrap;
            font-family: inherit;
            font-size: 14px;
            margin: 0;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .format-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .format-btn {
            background: #e2e8f0;
            border: none;
            padding: 5px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .format-btn:hover {
            background: #ff66b5;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🧠 NS Body Scan</h1>
            </div>
            <div class="menu">
                <a href="/trainer/dashboard">👨‍🏫 Мои клиенты</a>
                <a href="/dashboard">🏠 Главная</a>
                <a href="/logout">🚪 Выйти</a>
            </div>
        </div>

        <h2>✏️ Редактирование программы</h2>
        <p>Клиент: <strong>{{ client.name or client.username }}</strong></p>

        <form method="post" id="programForm">
            <div class="editor-container">
                <div class="editor-area">
                    <div class="format-buttons">
                        <button type="button" class="format-btn" onclick="insertFormat('### ')">📝 Заголовок</button>
                        <button type="button" class="format-btn" onclick="insertFormat('| Упражнение | Подходы | Повторения |\n|------------|---------|------------|\n| ')">📊 Таблица</button>
                        <button type="button" class="format-btn" onclick="insertFormat('- ')">• Маркер</button>
                        <button type="button" class="format-btn" onclick="insertFormat('**')">**Жирный**</button>
                        <button type="button" class="format-btn" onclick="insertFormat('\n---\n')">➖ Разделитель</button>
                    </div>
                    <textarea name="program_data" id="programText" rows="25" placeholder="Введите программу тренировок...">{{ current_program.program_data if current_program else '' }}</textarea>
                </div>
                <div class="preview-area">
                    <h4>📄 Предпросмотр</h4>
                    <div id="preview"></div>
                </div>
            </div>
            
            <div class="btn-group">
                <button type="submit" class="btn">💾 Сохранить программу</button>
                <a href="/trainer/client/{{ client.id }}" class="btn btn-secondary">← Назад</a>
            </div>
        </form>
    </div>

    <script>
        const textarea = document.getElementById('programText');
        const preview = document.getElementById('preview');
        
        function updatePreview() {
            let text = textarea.value;
            // Простое форматирование для предпросмотра
            text = text.replace(/\n/g, '<br>');
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/### (.*?)(<br>|$)/g, '<h3>$1</h3>');
            text = text.replace(/\|(.+?)\|/g, '<code>$1</code>');
            preview.innerHTML = text;
        }
        
        function insertFormat(format) {
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const before = text.substring(0, start);
            const selected = text.substring(start, end);
            const after = text.substring(end);
            
            let newText;
            if (format === '**') {
                newText = before + '**' + selected + '**' + after;
            } else {
                newText = before + format + selected + after;
            }
            
            textarea.value = newText;
            updatePreview();
        }
        
        textarea.addEventListener('input', updatePreview);
        updatePreview();
    </script>
</body>
</html>
