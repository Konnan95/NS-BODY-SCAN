<!DOCTYPE html>
<html>
<head>
    <title>Отзыв о тренере - NS Body Scan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/modern.css">
    <style>
        .rating {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .star {
            font-size: 40px;
            cursor: pointer;
            color: #ddd;
            transition: 0.2s;
        }
        .star.selected {
            color: #ffc107;
        }
        textarea {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            margin: 15px 0;
            font-family: inherit;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🧠 NS Body Scan</h1>
            </div>
            <div class="menu">
                <a href="/dashboard">🏠 Главная</a>
                <a href="/profile">👤 Профиль</a>
                <a href="/logout">🚪 Выйти</a>
            </div>
        </div>

        <h2>⭐ Отзыв о тренере</h2>
        <p>Тренер: <strong>{{ trainer.name or trainer.username }}</strong></p>

        <form method="post">
            <div class="rating">
                <span class="star" data-rating="1">★</span>
                <span class="star" data-rating="2">★</span>
                <span class="star" data-rating="3">★</span>
                <span class="star" data-rating="4">★</span>
                <span class="star" data-rating="5">★</span>
            </div>
            <input type="hidden" name="rating" id="rating" value="0">
            
            <textarea name="comment" rows="5" placeholder="Расскажите о вашем опыте работы с тренером..."></textarea>
            
            <button type="submit" class="btn">📤 Отправить отзыв</button>
            <a href="/trainer/client/{{ client.id }}" class="btn btn-secondary">← Назад</a>
        </form>
    </div>

    <script>
        const stars = document.querySelectorAll('.star');
        const ratingInput = document.getElementById('rating');
        
        stars.forEach(star => {
            star.addEventListener('click', () => {
                const rating = parseInt(star.dataset.rating);
                ratingInput.value = rating;
                
                stars.forEach((s, i) => {
                    if (i < rating) {
                        s.classList.add('selected');
                    } else {
                        s.classList.remove('selected');
                    }
                });
            });
        });
    </script>
</body>
</html>
