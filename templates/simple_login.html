<!DOCTYPE html>
<html>
<head>
    <title>Вход - NS Body Scan</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 10px; width: 300px; }
        h1 { color: #ff66b5; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #ff66b5; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
        a { color: #ff66b5; text-decoration: none; display: block; text-align: center; margin-top: 15px; }
        .flash { padding: 10px; margin: 10px 0; border-radius: 5px; text-align: center; }
        .danger { background: #f8d7da; color: #721c24; }
        .success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 NS Body Scan</h1>
        <h2 style="text-align:center">Вход</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endwith %}
        <form method="post" action="/login">
            <input type="text" name="username" placeholder="Логин" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <button type="submit">Войти</button>
        </form>
        <a href="/register">Нет аккаунта? Зарегистрироваться</a>
    </div>
</body>
</html>
